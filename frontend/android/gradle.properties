org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Disable Kotlin incremental compilation to work around the
# `RelocatableFileToPathConverter` bug that fires when project (drive D:)
# and pub-cache plugin sources (drive C:) live on different roots.
# Symptom: stack traces about
#   "this and base files have different roots:
#    C:\...\Pub\Cache\hosted\pub.dev\<plugin>... and D:\Project\Labventory\frontend\android."
# during `flutter run`/`assembleDebug`. Build still succeeds via fallback,
# but caches end up corrupt and every rebuild re-pays the cost. Turning
# incremental off makes builds quieter and, for our project size, faster.
kotlin.incremental=false
